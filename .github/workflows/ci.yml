name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src tests main.py
          ruff format --check src tests main.py

      - name: Type check (mypy)
        run: mypy src

      - name: Run pytest
        run: pytest -v

  # Verify the *built* package: since pyproject sets pythonpath = ["src"], local
  # runs and the editable job above both import from src/ and never exercise the
  # wheel. This job builds the wheel, installs it into a clean env, and runs the
  # suite with `-o pythonpath=` so the installed package is imported — catching
  # packaging bugs (a module missing from the wheel, a data file left out).
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build and install the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
          pip install dist/*.whl
          pip install pytest

      - name: Run pytest against the installed package
        run: pytest -v -o pythonpath=

      # Exercise the `romfs` console-script itself (not just main()) against
      # the committed fixture trees — catches entry-point / packaging
      # regressions that pytest (which calls main() directly) cannot.
      - name: Smoke-test the installed CLI
        run: |
          romfs -V
          romfs pack tests/fixtures/old -o /tmp/old.img -n rootfs-v1
          romfs pack tests/fixtures/new -o /tmp/new.img -n rootfs-v2
          # `romfs diff` exits 1 when differences exist (by design, like
          # diff(1)); GHA runs `bash -eo pipefail`, so mask that expected
          # non-zero here — the greps below verify the actual content.
          romfs diff /tmp/old.img /tmp/new.img | tee /tmp/diff.out || true
          grep -q 'volume' /tmp/diff.out
          grep -q 'added' /tmp/diff.out
          grep -q 'removed' /tmp/diff.out
          grep -q 'type-changed' /tmp/diff.out
          grep -q 'same size, content differs' /tmp/diff.out
          romfs list /tmp/old.img | grep -q 'etc/init.d/rcS'
          romfs info /tmp/new.img --verify | grep -q 'OK'
